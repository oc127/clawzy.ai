# =============================================================================
# Clawzy.ai PoC — Docker Compose
# Services: LiteLLM Proxy + PostgreSQL + OpenClaw Gateway
# Target: Alibaba Cloud ECS 4C8G Singapore
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — LiteLLM metadata store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: clawzy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy — unified model gateway
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: clawzy-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    ports:
      - "127.0.0.1:4000:4000"
    command: >
      --config /app/config.yaml
      --port 4000
      --detailed_debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — AI assistant engine
  # ---------------------------------------------------------------------------
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: clawzy-openclaw
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "true"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
      - ./openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # OpenClaw CLI — interactive terminal (run on-demand)
  # ---------------------------------------------------------------------------
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: clawzy-openclaw-cli
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
    stdin_open: true
    tty: true
    profiles:
      - cli

volumes:
  postgres_data:
  openclaw_config:
  openclaw_workspace:
