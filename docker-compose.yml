# =============================================================================
# Clawzy.ai — Docker Compose
# Services: PostgreSQL + Redis + LiteLLM + Backend API + Web App + OpenClaw Gateway
# Target: Alibaba Cloud ECS 4C8G Singapore
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — shared database (LiteLLM + Clawzy backend)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: clawzy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawzy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: clawzy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - clawzy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawzy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — caching, rate limiting, Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: clawzy-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clawzy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy — unified model gateway
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.0-stable.patch5
    container_name: clawzy-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://clawzy:${POSTGRES_PASSWORD}@postgres:5432/litellm_db
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - clawzy-network
    command: >
      --config /app/config.yaml
      --port 4000
      --detailed_debug
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Clawzy Backend API — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: clawzy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://clawzy:${POSTGRES_PASSWORD}@postgres:5432/clawzy
      REDIS_URL: redis://redis:6379/0
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OPENCLAW_GATEWAY_URL: http://clawzy-openclaw:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
      OPENCLAW_NETWORK: clawzy-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openclaw_agent_configs:/var/lib/clawzy/agents
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - clawzy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Web App — Next.js frontend
  # ---------------------------------------------------------------------------
  webapp:
    build: ./web
    container_name: clawzy-webapp
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - clawzy-network
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — shared AI assistant engine (PoC / demo)
  # In production, user agents are created dynamically by the backend
  # ---------------------------------------------------------------------------
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: clawzy-openclaw
    restart: unless-stopped
    user: "0:0"
    depends_on:
      litellm:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/tmp/entrypoint.sh"]
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "true"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
      - ./openclaw/openclaw.json:/tmp/openclaw.json.tpl:ro
      - ./openclaw/entrypoint.sh:/tmp/entrypoint.sh:ro
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
    networks:
      - clawzy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # OpenClaw CLI — interactive terminal (run on-demand)
  # ---------------------------------------------------------------------------
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: clawzy-openclaw-cli
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
    stdin_open: true
    tty: true
    profiles:
      - cli

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy (HTTP + WebSocket)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: clawzy-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      webapp:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    networks:
      - clawzy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  clawzy-network:
    name: clawzy-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  openclaw_config:
  openclaw_workspace:
  openclaw_agent_configs:
