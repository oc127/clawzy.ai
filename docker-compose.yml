# =============================================================================
# Clawzy.ai — Docker Compose
# Services: PostgreSQL + Redis + LiteLLM + Backend + Frontend + Celery + OpenClaw
# Target: Alibaba Cloud ECS 4C8G Singapore
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — shared database (LiteLLM + Clawzy backend)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: clawzy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawzy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: clawzy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawzy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # Redis — caching, rate limiting, Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: clawzy-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    mem_limit: "512m"
    cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy — unified model gateway
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: clawzy-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://clawzy:${POSTGRES_PASSWORD}@postgres:5432/litellm_db
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    ports:
      - "127.0.0.1:4000:4000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      --config /app/config.yaml
      --port 4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # Clawzy Backend API — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: clawzy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://clawzy:${POSTGRES_PASSWORD}@postgres:5432/clawzy
      REDIS_URL: redis://redis:6379/0
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-price_starter_monthly}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_pro_monthly}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-price_business_monthly}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@clawzy.ai}
      APP_URL: ${APP_URL:-https://clawzy.ai}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8000:8000"
    mem_limit: "2g"
    cpus: "1.5"
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # Celery Worker — 执行健康检查、容器管理等后台任务
  # ---------------------------------------------------------------------------
  celery-worker:
    build: ./backend
    container_name: clawzy-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker -l info -c 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://clawzy:${POSTGRES_PASSWORD}@postgres:5432/clawzy
      REDIS_URL: redis://redis:6379/0
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: "1g"
    cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # Celery Beat — 定时调度（健康检查、僵尸清理）
  # ---------------------------------------------------------------------------
  celery-beat:
    build: ./backend
    container_name: clawzy-celery-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat -l info
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://clawzy:${POSTGRES_PASSWORD}@postgres:5432/clawzy
      REDIS_URL: redis://redis:6379/0
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
    mem_limit: "256m"
    cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # Web Frontend — Next.js
  # ---------------------------------------------------------------------------
  web:
    build: ./web
    container_name: clawzy-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/api/v1}
      NEXT_PUBLIC_STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-price_starter_monthly}
      NEXT_PUBLIC_STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_pro_monthly}
      NEXT_PUBLIC_STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-price_business_monthly}
    ports:
      - "127.0.0.1:3000:3000"
    mem_limit: "512m"
    cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — default AI assistant engine (PoC / demo)
  # In production, user agents are created dynamically by the backend
  # ---------------------------------------------------------------------------
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: clawzy-openclaw
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "true"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
      - ./openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - clawzy-network

  # ---------------------------------------------------------------------------
  # OpenClaw CLI — interactive terminal (run on-demand)
  # ---------------------------------------------------------------------------
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: clawzy-openclaw-cli
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
    stdin_open: true
    tty: true
    profiles:
      - cli

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy (optional for local dev, use profile: proxy)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: clawzy-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - clawzy-network
    profiles:
      - proxy

volumes:
  postgres_data:
  redis_data:
  openclaw_config:
  openclaw_workspace:

networks:
  clawzy-network:
    name: clawzy-network
    driver: bridge
