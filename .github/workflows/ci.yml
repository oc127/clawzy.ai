name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run linter
        run: |
          pip install ruff
          ruff check backend/
      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///file::memory:?cache=shared&uri=true
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          LITELLM_URL: http://localhost:4000
          LITELLM_MASTER_KEY: sk-test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix web
      - name: Type check
        run: npx --prefix web tsc --noEmit
      - name: Build
        run: npm run build --prefix web

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
      - name: Scan npm dependencies
        run: npm audit --prefix web --audit-level=high || true
      - name: Check for secrets in code
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || detect-secrets scan

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
      - name: Verify compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  load-test:
    name: Load Test (k6 smoke)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: Run k6 smoke test
        run: k6 run tests/load/k6-smoke.js
        env:
          K6_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:8000' }}
          K6_TEST_EMAIL: ${{ secrets.K6_TEST_EMAIL || 'loadtest@clawzy.ai' }}
          K6_TEST_PASSWORD: ${{ secrets.K6_TEST_PASSWORD || 'loadtest123' }}
